<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyons Operations - Main Hub</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e1a;
            color: #e0e6ff;
            min-height: 100vh;
        }

        /* ─── HEADER ─── */
        header {
            background: linear-gradient(135deg, #1a1f3a 0%, #0d1126 100%);
            border-bottom: 2px solid #2a3a6e;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #ff6b00, #ff9500);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 4px 15px rgba(255,107,0,0.4);
        }

        .logo-text h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .logo-text p {
            font-size: 0.75rem;
            color: #8892b0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        nav {
            display: flex;
            gap: 10px;
        }

        nav a {
            color: #8892b0;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        nav a:hover, nav a.active {
            color: #ff6b00;
            background: rgba(255,107,0,0.1);
            border-color: rgba(255,107,0,0.3);
        }

        /* ─── HERO STRIP ─── */
        .hero-strip {
            background: linear-gradient(90deg, #ff6b00, #ff9500, #ffb700);
            padding: 12px 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .hero-strip span {
            color: #000;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .live-badge {
            background: #000;
            color: #ff6b00;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* ─── MAIN GRID ─── */
        .main-content {
            padding: 25px 30px;
            display: grid;
            grid-template-columns: 380px 1fr;
            grid-template-rows: auto 1fr;
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* ─── WEATHER WIDGET ─── */
        .weather-widget {
            background: linear-gradient(145deg, #1a2040, #0f1628);
            border: 1px solid #2a3a6e;
            border-radius: 16px;
            padding: 20px;
            grid-row: 1;
            grid-column: 1;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }

        .widget-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .widget-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #8892b0;
            font-weight: 600;
        }

        .weather-search {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .weather-search input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid #2a3a6e;
            color: #e0e6ff;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .weather-search input:focus {
            border-color: #ff6b00;
        }

        .weather-search button {
            background: #ff6b00;
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: background 0.3s;
        }

        .weather-search button:hover {
            background: #ff9500;
        }

        .weather-main {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .weather-icon {
            font-size: 64px;
            line-height: 1;
        }

        .weather-temp {
            font-size: 3rem;
            font-weight: 300;
            color: #ffffff;
        }

        .weather-temp sup {
            font-size: 1.5rem;
            vertical-align: super;
        }

        .weather-desc {
            font-size: 1rem;
            color: #8892b0;
            text-transform: capitalize;
            margin-top: 5px;
        }

        .weather-location {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ff9500;
        }

        .weather-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .weather-detail-item {
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .detail-icon {
            font-size: 1.2rem;
        }

        .detail-info label {
            display: block;
            font-size: 0.65rem;
            color: #8892b0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .detail-info span {
            font-size: 0.9rem;
            font-weight: 600;
            color: #e0e6ff;
        }

        .weather-forecast {
            margin-top: 15px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .forecast-item {
            flex-shrink: 0;
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            padding: 10px 14px;
            text-align: center;
            min-width: 70px;
        }

        .forecast-item .f-day {
            font-size: 0.7rem;
            color: #8892b0;
            margin-bottom: 5px;
        }

        .forecast-item .f-icon {
            font-size: 1.4rem;
            margin-bottom: 5px;
        }

        .forecast-item .f-temp {
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* ─── QUICK LINKS PANEL ─── */
        .quick-links {
            background: linear-gradient(145deg, #1a2040, #0f1628);
            border: 1px solid #2a3a6e;
            border-radius: 16px;
            padding: 20px;
            grid-row: 2;
            grid-column: 1;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }

        .quick-link-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .ql-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid #2a3a6e;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s;
            cursor: pointer;
        }

        .ql-card:hover {
            background: rgba(255,107,0,0.1);
            border-color: rgba(255,107,0,0.4);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255,107,0,0.2);
        }

        .ql-icon {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .ql-label {
            font-size: 0.75rem;
            color: #8892b0;
            font-weight: 500;
        }

        /* ─── MAP SECTION ─── */
        .map-section {
            background: linear-gradient(145deg, #1a2040, #0f1628);
            border: 1px solid #2a3a6e;
            border-radius: 16px;
            overflow: hidden;
            grid-row: 1 / 3;
            grid-column: 2;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
        }

        .map-header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid #2a3a6e;
        }

        .map-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .map-controls {
            display: flex;
            gap: 8px;
        }

        .map-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid #2a3a6e;
            color: #8892b0;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .map-btn:hover, .map-btn.active {
            background: rgba(255,107,0,0.15);
            border-color: rgba(255,107,0,0.4);
            color: #ff9500;
        }

        #traffic-map {
            flex: 1;
            min-height: 550px;
        }

        .map-legend {
            padding: 12px 20px;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid #2a3a6e;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: #8892b0;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        /* ─── INCIDENT TICKER ─── */
        .incident-ticker {
            background: rgba(255,50,50,0.1);
            border: 1px solid rgba(255,50,50,0.3);
            border-radius: 10px;
            padding: 10px 15px;
            margin: 0 30px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            overflow: hidden;
        }

        .ticker-label {
            background: #ff3232;
            color: #fff;
            padding: 3px 10px;
            border-radius: 5px;
            font-size: 0.7rem;
            font-weight: 700;
            white-space: nowrap;
            letter-spacing: 1px;
        }

        .ticker-text {
            font-size: 0.82rem;
            color: #ffb0b0;
            white-space: nowrap;
            animation: ticker 30s linear infinite;
        }

        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-200%); }
        }

        /* ─── STATUS BAR ─── */
        .status-bar {
            background: rgba(0,0,0,0.3);
            border-top: 1px solid #2a3a6e;
            padding: 8px 30px;
            display: flex;
            gap: 25px;
            font-size: 0.72rem;
            color: #8892b0;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #00ff88;
            animation: pulse 2s infinite;
        }

        /* ─── LOADING STATE ─── */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            color: #8892b0;
            font-size: 0.85rem;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,107,0,0.2);
            border-top-color: #ff6b00;
            border-radius: 50%;
