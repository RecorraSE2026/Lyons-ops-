backend:
  name: git-gateway
  branch: main
media_folder: "uploads"
public_folder: "/uploads"
collections:
  - name: notices
    label: Company Notices
    folder: content/notices
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: Title, name: title, widget: string}
      - {label: Message, name: body, widget: text}
      - {label: Priority, name: priority, widget: select, options: [normal, high], default: normal}
      - {label: Posted by, name: author, widget: string, default: Operations}
      - {label: Date, name: date, widget: datetime}
  - name: guides
    label: Training Guides
    folder: content/guides
    create: true
    slug: "{{slug}}"
    fields:
      - {label: Title, name: title, widget: string}
      - {label: Description, name: description, widget: text}
      - {label: Category, name: category, widget: select, options: ["Driver Handbook","Cold Chain","Health & Safety","Company Policy","Route Guide","Other"]}
      - {label: "PDF File", name: file, widget: file}
      - {label: Date added, name: date, widget: datetime}
